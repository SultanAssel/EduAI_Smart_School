{% extends 'core/base.html' %}
{% block title %}404 — {{ t.err_404_title }}{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card" style="text-align:center;max-width:480px">
        <div style="font-size:5rem;font-weight:800;background:var(--g-2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">404</div>
        <h1 style="margin:0.5rem 0">{{ t.err_404_title }}</h1>
        <p style="color:var(--t2);margin-bottom:1.5rem">{{ t.err_404_desc }}</p>
        <div style="display:flex;gap:0.75rem;justify-content:center">
            <a href="{% url 'home' %}" class="btn btn-primary"><i class="fas fa-home"></i> {{ t.err_go_home }}</a>
            <a href="{% url 'copilot' %}" class="btn btn-secondary"><i class="fas fa-robot"></i> {{ t.dash_ask_ai }}</a>
        </div>
    </div>
</div>
{% endblock %}
